syntax = "proto3";

import "newsdoc/newsdoc.proto";

package ttab.distribution;

option go_package = "github.com/ttab/elephant-public-api/distribution";

service Configuration {
  // RegisterConfigGeneration registers a complete configuration set
  // (schemas + type configurations) as a new generation. Existing schema
  // versions can be re-used by name and version without re-supplying the
  // spec; if the spec is supplied for an existing version it must match
  // the stored one. Returns the new generation ID.
  rpc RegisterConfigGeneration(RegisterConfigGenerationRequest) returns (RegisterConfigGenerationResponse);
  // ActivateConfigGeneration switches the active configuration to the
  // generation with the given ID.
  rpc ActivateConfigGeneration(ActivateConfigGenerationRequest) returns (ActivateConfigGenerationResponse);
  // GetActiveConfigGeneration returns the currently active generation,
  // including its schemas and type configurations. Supports long polling
  // for changes.
  rpc GetActiveConfigGeneration(GetActiveConfigGenerationRequest) returns (GetActiveConfigGenerationResponse);
  // ListConfigGenerations lists historical generations, most recent first.
  rpc ListConfigGenerations(ListConfigGenerationsRequest) returns (ListConfigGenerationsResponse);
  // GetSchema retrieves a stored schema spec by name and version.
  rpc GetSchema(GetSchemaRequest) returns (GetSchemaResponse);
  // GetAllActiveSchemas returns the schemas in the active generation.
  // Supports long polling so clients can watch for changes.
  rpc GetAllActiveSchemas(GetAllActiveSchemasRequest) returns (GetAllActiveSchemasResponse);
  // GetDocumentTypes lists the document types declared by schemas in the
  // active generation.
  rpc GetDocumentTypes(GetDocumentTypesRequest) returns (GetDocumentTypesResponse);
  // GetTypeConfiguration returns the configuration for a type in the
  // active generation.
  rpc GetTypeConfiguration(GetTypeConfigurationRequest) returns (GetTypeConfigurationResponse);
  // SetSyncState sets the desired state of the distribution sync worker.
  // A cold-started service (no configuration, no sync position) starts
  // out paused so that the repository eventlog isn't consumed - and
  // discarded - before a configuration generation has been activated.
  rpc SetSyncState(SetSyncStateRequest) returns (SetSyncStateResponse);
  // GetSyncStatus returns the desired and current state of the
  // distribution sync worker together with its position in the
  // repository eventlog.
  rpc GetSyncStatus(GetSyncStatusRequest) returns (GetSyncStatusResponse);
}

service Content {
  rpc GetNewDocuments(GetNewDocumentsRequest) returns (GetNewDocumentsResponse);
}

message GetNewDocumentsRequest {
  // After returns new documents after the given event ID.
  int64 after = 1;
  // Subset returns a subset of the documents as specified by a map of newsdoc
  // value extractors keyed by the types that they should be applied to.
  map<string,Subsets> subset = 2;
  // LoadDocuments should be set to true if you want the full documents in the
  // response. If subset is used it will override load_documents.
  bool load_documents = 3;
}

message Subsets {
  // Expressions to use to extract document contents.
  repeated string expressions = 1;
}

message GetNewDocumentsResponse {
  repeated DocumentItem items = 1;
}

message DocumentItem {
  // Event information.
  DocumentEvent event = 1;
  // Document is the full document (if requested).
  newsdoc.Document document = 2;
  // Subset is the extracted subset of the document.
  repeated ExtractedValues subset = 3;
}

message ExtractedValues {
  // Extractor index for the the extractor that produced the values.
  int64 extractor = 1;
  // Values that were extracted.
  map<string, ExtractedValue> values = 2;
}

message ExtractedValue {
  // Value is used for extracted attributes and data values.
  string value        = 1;
  // Block is used for block extractors.
  newsdoc.Block block = 2;
  // Annotations can be used to differentiate between different extracted values.
  string annotation   = 3;
  // Role can be used to differentiate between different extracted values.
  string role         = 4;
}

message DocumentEvent {
  // ID of the event.
  int64 id = 1;
  // EventType is either "published" or "unpublished".
  string event_type = 2;
  // DocUUID is the UUID of the affected document.
  string doc_uuid = 3;
  // Version that was published (if this was a publish event).
  int64 version = 4;
}

message Schema {
  string name    = 1;
  string version = 2;
  string spec    = 3;
}

// ConfigGenerationSchema references a schema version included in a
// generation. Spec is optional when the version is already stored; it is
// required when registering a new (name, version) pair.
message ConfigGenerationSchema {
  string name    = 1;
  string version = 2;
  string spec    = 3;
}

// ConfigGenerationType configures a document type within a generation.
message ConfigGenerationType {
  string type                        = 1;
  TypeConfiguration configuration    = 2;
}

message ConfigGeneration {
  // ID is assigned by the server on registration.
  int64 id                                  = 1;
  // Description is an optional human-readable tag.
  string description                        = 2;
  // CreatedAt is the time of registration, RFC3339.
  string created_at                         = 3;
  // ActivatedAt is the time the generation was last activated, RFC3339, or
  // empty if it has never been activated.
  string activated_at                       = 4;
  // Schemas in the generation.
  repeated ConfigGenerationSchema schemas   = 5;
  // Types configured in the generation.
  repeated ConfigGenerationType types       = 6;
}

message RegisterConfigGenerationRequest {
  // Description is an optional human-readable tag for the new generation.
  string description                        = 1;
  // Schemas the generation should contain. Order is preserved.
  repeated ConfigGenerationSchema schemas   = 2;
  // Types the generation should contain. Order is preserved.
  repeated ConfigGenerationType types       = 3;
  // Activate the new generation immediately. Defaults to false; callers
  // typically register first and activate as a separate step so they can
  // inspect the diff first.
  bool activate                             = 4;
}

message RegisterConfigGenerationResponse {
  // Generation is the persisted generation, with its assigned ID.
  ConfigGeneration generation = 1;
}

message ActivateConfigGenerationRequest {
  // ID of the generation to activate.
  int64 id = 1;
}

message ActivateConfigGenerationResponse {
  ConfigGeneration generation = 1;
}

message GetActiveConfigGenerationRequest {
  // WaitSeconds is the maximum number of seconds to wait for the active
  // generation to differ from KnownId. Defaults to 10. Optional.
  int64 wait_seconds = 1;
  // KnownId is the generation ID the client already has; the call returns
  // immediately when the active generation differs. Optional.
  int64 known_id     = 2;
  // OnlyChanged returns an empty response (with Unchanged=true) if the
  // active generation matches KnownId.
  bool only_changed  = 3;
}

message GetActiveConfigGenerationResponse {
  // Generation is the active generation, populated with schemas and type
  // configurations.
  ConfigGeneration generation = 1;
  // Unchanged is true if KnownId matched the active generation and
  // OnlyChanged was set.
  bool unchanged              = 2;
}

message ListConfigGenerationsRequest {
  // Before is the highest generation ID to return; defaults to the latest.
  // Use the smallest returned ID to paginate further into the past.
  int64 before    = 1;
  // PageSize defaults to 50, max 200.
  int64 page_size = 2;
}

message ListConfigGenerationsResponse {
  // Generations without schemas or type configurations populated.
  repeated ConfigGeneration generations = 1;
}

message GetSchemaRequest {
  // Name of the schema to get.
  string name = 1;
  // Version of the schema to get, optional. The currently active version of the
  // schema will be returned if no version is specified.
  string version = 2;
}

message GetSchemaResponse {
  string version = 1;
  bytes spec = 2;
}

message GetAllActiveSchemasRequest {
  // WaitSeconds is the maximum number of seconds to wait for changes, defaults
  // to 10 seconds. Optional.
  int64 wait_seconds        = 1;
  // Known schema versions that the client already has. Optional.
  map<string, string> known = 2;
  // OnlyChanged only returns the schemas that have been changed.
  bool only_changed         = 3;
}

message GetAllActiveSchemasResponse {
  // Schemas that currently are active.
  repeated Schema schemas = 1;
  // Unchanged is set to true if no changes were done compared to known schema
  // versions.
  bool unchanged          = 2;
  // Removed schemas.
  repeated string removed = 3;
}

message GetDocumentTypesRequest {}

message GetDocumentTypesResponse {
  // Types that have been defined in the schema.
  repeated string types = 1;
}

message TypeConfiguration {
  // Set to true if this is a collection of documents that are bounded (limited
  // in size). Bounded collections can be fetched by type and language in one
  // go.
  bool bounded_collection                      = 1;
  // TimeExpressions are used for extracting time ranges from documents.
  repeated TypeTimeExpression time_expressions = 2;
  // LabelExpressions are used to extract labels from documents.
  repeated LabelExpression label_expressions   = 3;
  // Variants are the allowed variants for the document type.
  repeated string variants                     = 4;
  // TransformScript is the transformation script for this document type.
  string transform_script                      = 5;
}

message TypeTimeExpression {
  // Expression is a newsdoc value extraction expression.
  string expression = 1;
  // Layout is the time/date format to use when parsing. Optional, defaults to
  // RFC3339 or ISO 8601 for values annotated as dates.
  string layout     = 2;
  // Timezone is the timezone the time should be parsed in. Optional, most
  // timestamps should include timezone information, if they don't, parsing will
  // fall back to the default timezone that the repository has been configured
  // with.
  string timezone   = 3;
}

message LabelExpression {
  // Expression is a newsdoc value extraction expression.
  string expression = 1;
  // Template is the template that turns the extracted values into a label.
  string template   = 2;
}

message SetSyncStateRequest {
  // Desired state of the sync worker, either "running" or "paused".
  string desired = 1;
}

message SetSyncStateResponse {}

message GetSyncStatusRequest {}

message GetSyncStatusResponse {
  // Desired is the state the sync worker should be in, either "running"
  // or "paused".
  string desired    = 1;
  // Current is the state the sync worker most recently reported, either
  // "running" or "paused". Empty if the worker has never reported a
  // state.
  string current    = 2;
  // Position is the repository eventlog ID that the sync worker has
  // processed up to.
  int64 position    = 3;
  // CaughtUp is true if the sync worker had caught up with the head of
  // the repository eventlog when it last stored its position.
  bool caught_up    = 4;
}

message GetTypeConfigurationRequest {
  // Type to get configuration for.
  string type = 1;
}

message GetTypeConfigurationResponse {
  // Configuration of the type.
  TypeConfiguration configuration = 1;
}
