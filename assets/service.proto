syntax = "proto3";

package ttab.assets;

option go_package = "github.com/ttab/elephant-public-api/assets";

// Keys serves the asset CDN signing keys to URL-minting services. The
// asset service is the key authority: it generates and rotates the keys,
// and both signers and the CDN edge get key material from it, so they can
// never disagree. Callers authorize with normal client credentials — a
// scope in their access token grants the key-fetch method, nothing more.
service Keys {
  // GetSigningKeys returns the current signing key set: active, upcoming
  // (pre-distributed before their not_before), and recently expired keys.
  // Signers cache the set and select the delivery key whose validity
  // window covers the current time.
  rpc GetSigningKeys(GetSigningKeysRequest) returns (GetSigningKeysResponse);
}

message GetSigningKeysRequest {}

message GetSigningKeysResponse {
  repeated SigningKey keys = 1;
}

message SigningKey {
  // Kid is the key identifier carried in minted tokens.
  string kid = 1;
  // Secret is the hex-encoded HMAC key material.
  string secret = 2;
  // NotBefore is the start of the validity window, unix seconds.
  int64 not_before = 3;
  // NotAfter is the end of the validity window, unix seconds.
  int64 not_after = 4;
  // Use is "delivery" for routinely rotated delivery keys or "public"
  // for the long-lived key that signs permanent public URLs.
  string use = 5;
}

// Management exposes the take-down operations: one authorized call instead
// of a runbook of raw AWS actions, callable by editorial tooling or event
// handlers as well as by humans. Note that in the ingest model a take-down
// only stops new deliveries — customers already hold ingested copies, so
// the take-down workflow is primarily a customer-notification process with
// this RPC as one step.
service Management {
  // Takedown purges an asset's derivatives from the derivatives bucket
  // and invalidates its CDN paths. Optionally pins the asset to a single
  // selector at the edge (the retroactive-crop kill switch): with a pin
  // set, requests for any other selector are rejected regardless of token
  // validity.
  rpc Takedown(TakedownRequest) returns (TakedownResponse);
  // RemoveSelectorPin removes a selector pin. Safe once every token
  // minted before the pin was set has expired (the maximum token
  // lifetime is 30 days) and issuance-time enforcement is in place.
  rpc RemoveSelectorPin(RemoveSelectorPinRequest) returns (RemoveSelectorPinResponse);
  // SetAudienceDeny adds or removes an audience deny-list entry at the
  // edge: coarse revocation of every URL signed for the audience.
  rpc SetAudienceDeny(SetAudienceDenyRequest) returns (SetAudienceDenyResponse);
  // WarmIntermediate queues population of the cached intermediate for an
  // asset, so the first derivative request doesn't pay the original
  // fetch. Fire-and-forget: the response reports queueing, not
  // completion. Requires the asset_warm or asset_admin scope.
  rpc WarmIntermediate(WarmIntermediateRequest) returns (WarmIntermediateResponse);
}

message TakedownRequest {
  // Ns is the source namespace of the asset.
  string ns = 1;
  // Id of the asset in the namespace's id scheme.
  string id = 2;
  // Version narrows the purge to a single version. Optional; the default
  // purges every version.
  string version = 3;
  // PinSelector pins the asset to this selector string at the edge
  // (e.g. "c-0.2-0.2-0.5-0.5"). Optional.
  string pin_selector = 4;
}

message TakedownResponse {
  // DeletedObjects is the number of derivatives removed from the bucket.
  int64 deleted_objects = 1;
  // InvalidationId of the CDN invalidation, empty when the service runs
  // without a CDN distribution configured.
  string invalidation_id = 2;
}

message RemoveSelectorPinRequest {
  // Ns is the source namespace of the asset.
  string ns = 1;
  // Id of the asset in the namespace's id scheme.
  string id = 2;
}

message RemoveSelectorPinResponse {}

message SetAudienceDenyRequest {
  // Aud is the audience identifier.
  string aud = 1;
  // Denied adds the deny entry when true and removes it when false.
  bool denied = 2;
}

message SetAudienceDenyResponse {}

message WarmIntermediateRequest {
  // Ns is the source namespace of the asset.
  string ns = 1;
  // Id of the asset in the namespace's id scheme.
  string id = 2;
  // Version of the asset; defaults to the current version ("0").
  string version = 3;
}

message WarmIntermediateResponse {
  // State is "queued" (population is pending, including when it already
  // was), "cached" (an intermediate already exists), or "disabled" (the
  // namespace doesn't use the intermediate cache — not an error, so
  // fire-and-forget callers stay quiet across config changes).
  string state = 1;
}
